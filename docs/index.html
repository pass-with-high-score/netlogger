<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetLogger - Sileo Repository</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: #0a0a0a;
      color: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 480px;
      width: 100%;
      padding: 2rem;
      text-align: center;
    }

    .icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .version {
      display: inline-block;
      font-size: 0.8rem;
      color: #86868b;
      background: rgba(255, 255, 255, 0.06);
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      margin-bottom: 1.25rem;
    }

    .description {
      color: #a1a1a6;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .add-btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.85rem 2rem;
      border-radius: 12px;
      transition: background 0.2s;
      margin-bottom: 0.75rem;
    }

    .add-btn:hover { background: #1d4ed8; }

    .repo-url {
      display: block;
      font-size: 0.82rem;
      color: #636366;
      margin-top: 0.5rem;
      word-break: break-all;
    }

    .info {
      margin-top: 2.5rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
    }

    .info-item {
      text-align: center;
    }

    .info-label {
      font-size: 0.72rem;
      color: #636366;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }

    .info-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #d1d1d6;
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.78rem;
      color: #48484a;
    }

    .footer a {
      color: #48484a;
      text-decoration: none;
    }

    .footer a:hover { color: #86868b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>NetLogger</h1>
    <span class="version">v0.0.1 &bull; rootless</span>
    <p class="description">
      Network request logger for jailbroken iOS. Monitor HTTP/HTTPS, TCP, and UDP traffic from any app in real time.
    </p>
    <a class="add-btn" href="sileo://source/https://pass-with-high-score.github.io/NetLogger/">Add to Sileo</a>
    <span class="repo-url">https://pass-with-high-score.github.io/NetLogger/</span>

    <div class="info">
      <div class="info-item">
        <div class="info-label">Platform</div>
        <div class="info-value">iOS 15+</div>
      </div>
      <div class="info-item">
        <div class="info-label">Architecture</div>
        <div class="info-value">arm64 / arm64e</div>
      </div>
      <div class="info-item">
        <div class="info-label">Author</div>
        <div class="info-value">Minh</div>
      </div>
    </div>

    <div class="footer">
      <a href="https://github.com/pass-with-high-score/NetLogger">GitHub</a>
    </div>
  </div>
</body>
</html>
